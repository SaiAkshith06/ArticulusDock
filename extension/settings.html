<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 400px;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #FDFCFB;
      color: #1A1A1A;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .logo {
      width: 40px;
      height: 40px;
      background: #5A5A40;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 20px;
    }
    .title {
      font-size: 24px;
      font-weight: 700;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #999;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 12px;
      background: #F5F5F0;
      border: 1px solid #E5E5E0;
      border-radius: 12px;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #5A5A40;
      background: white;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: #5A5A40;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }
    .btn:hover {
      background: #4A4A30;
    }
    .status {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
      color: #5A5A40;
      font-weight: 500;
    }
    .help {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #E5E5E0;
      font-size: 13px;
      color: #666;
      line-height: 1.6;
    }
    .help a {
      color: #5A5A40;
      text-decoration: none;
      font-weight: 600;
    }
    .help a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">L</div>
    <div class="title">Settings</div>
  </div>
  
  <div className="form-group">
    <label>Your User ID</label>
    <input type="text" id="userId" placeholder="Enter your User ID from Lumina Dashboard">
  </div>

  <div className="form-group">
    <label>API Endpoint (Optional)</label>
    <input type="text" id="apiUrl" placeholder="https://.../api/save">
  </div>

  <button id="saveBtn" className="btn">Save Settings</button>
  <div id="status" className="status"></div>

  <div className="help">
    <p>Find your User ID in the <strong>Lumina Dashboard</strong> under the profile section.</p>
    <p>Don't have an account? <a href="https://ais-dev-savhgc5cgg74jr7ahe4onr-471225792982.asia-southeast1.run.app" target="_blank">Sign up for Lumina</a></p>
  </div>

  <script src="settings.js"></script>
</body>
</html>
